spring:
  application:
    name: zhou-ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      # 需要替换为真实的 api key
      api-key: local-key
      chat:
        options:
          model: qwen-plus
    vectorstore:
      pgvector:
      index-type: HNSW
      distance-type: COSINE_DISTANCE
      # 如果不确定维度数可以不指定, 不给会默认根据实际维度数指定维度数量
      # 表一旦建好就不能更改维度值了, 最好在之前确认好模型维度
      dimensions: 1536
      max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
    mcp:
      client:
        # 标准io(stdio)使用第三方mcp或者自定义mcp server(自己开发)和客户端在同一服务器下,
        # mcp-servers.json 为mcp配置文件, 启动程序时会开子进程启动mcp, 能用 tool 不用 mcp
        stdio:
          servers-configuration: classpath:mcp-servers.json

  datasource:
    # 使用的本地docker创建的镜像, 端口默认5432, 映射为5433
    url: jdbc:postgresql://localhost:5433/zhou_ai_agent
    username: postgres
    password: postgres

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zhou.zhouaiagent.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn


# searchAPI
search-api:
  # 需要替换为真实的 key
  api-key: real api Key
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG