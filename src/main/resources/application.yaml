spring:
  application:
    name: zhou-ai-agent
  profiles:
    active: local
  ai:
    dashscope:
      # 需要替换为真实的 api key
      api-key: local-key
      chat:
        options:
          model: qwen-plus
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zhou.zhouaiagent.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn